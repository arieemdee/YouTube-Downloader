<!DOCTYPE html>
<html>
<head>

    <title>YouTube Downloader</title>

    <style>

        body{
            font-family: Arial;
            background:#111;
            color:#0f0;
            padding:40px;
        }

        input, button{
            padding:10px;
            margin:5px;
            width:400px;
        }

        button{
            background:#0f0;
            color:#000;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }

        button:disabled{
            background:#444;
            color:#999;
            cursor:not-allowed;
        }

        pre{
            background:#000;
            padding:15px;
            overflow:auto;
            white-space:pre-wrap;
        }

        .format-id {
            cursor: pointer;
            color: #6f6;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .format-id:hover {
            background: #1a1a1a;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        /* Progress bar */
        .progress-wrap{
            width:400px;
            background:#111;
            border:1px solid #333;
            padding:6px;
            margin:8px 0;
            display:none;
        }

        .progress{
            width:100%;
            height:18px;
            background:#222;
            border-radius:4px;
            overflow:hidden;
        }

        .progress-bar{
            height:100%;
            width:0%;
            background:linear-gradient(90deg,#0f0,#6f6);
            transition: width 200ms linear;
        }

        .progress-text{
            margin-top:6px;
            color:#0f0;
            font-size:12px;
        }

    </style>

</head>
<body>

    <h1>🎬 YouTube Downloader</h1>

    <input
        type="text"
        id="url"
        placeholder="Masukkan URL YouTube"
    >

    <br>

    <button id="checkFormatBtn" onclick="getFormats()">
        Cek Format
    </button>

    <pre id="formats"></pre>

    <input
        type="text"
        id="format"
        placeholder="Contoh: 136+140"
    >

    <br>

    <button id="downloadBtn" onclick="downloadVideo()">
        Download
    </button>
    <button id="cancelBtn" style="display:none;" onclick="cancelDownload()">Cancel</button>
    <button id="retryBtn" style="display:none;" onclick="retryDownload()">Retry</button>

    <pre id="result"></pre>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
    </div>

    <script>

        const checkFormatBtn = document.getElementById("checkFormatBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const urlInput = document.getElementById('url');
        const formatInput = document.getElementById('format');
        const formatsPre = document.getElementById('formats');
        const resultPre = document.getElementById('result');
        const cancelBtn = document.getElementById('cancelBtn');
        const retryBtn = document.getElementById('retryBtn');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        // select-all on focus and keep selection on mouse click
        if (urlInput) {
          urlInput.addEventListener('focus', e => e.target.select());
          urlInput.addEventListener('mouseup', e => e.preventDefault());
        }

        function handleEnterKey(e) {
          const isEnter = e.key === 'Enter' || e.code === 'Enter';
          if (!isEnter) return;
          e.preventDefault();

          if (document.activeElement === urlInput) {
            getFormats();
          } else if (document.activeElement === formatInput) {
            downloadVideo();
          }
        }

        if (urlInput) {
          urlInput.addEventListener('keydown', handleEnterKey);
        }

        if (formatInput) {
          formatInput.addEventListener('keydown', handleEnterKey);
        }

        async function getFormats(){
            checkFormatBtn.disabled = true;
            checkFormatBtn.textContent = "Memeriksa...";

            try {
                const url = urlInput.value;

                const res = await fetch("/api/formats", {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({ url })
                });

                const text = await res.text();
                // Parse and make format IDs clickable
                const htmlContent = makeFormatIdsClickable(text);
                formatsPre.innerHTML = htmlContent;
            } catch (err) {
                formatsPre.textContent = "Terjadi kesalahan saat memeriksa format.";
            } finally {
                checkFormatBtn.disabled = false;
                checkFormatBtn.textContent = "Cek Format";
            }
        }

        function makeFormatIdsClickable(text) {
            // Replace format IDs (dapat berupa angka, huruf, underscore, dash)
            // Matches: 136, 137_2, abc123, atau kombinasi dengan + (e.g., 136+140, 137_2+140, dll)
            return text.replace(/\b([a-zA-Z0-9_-]+(?:\+[a-zA-Z0-9_-]+)*)\b/g, (match) => {
                return `<span class="format-id" onclick="selectFormat('${match}')" title="Klik untuk memilih">${match}</span>`;
            });
        }

        function selectFormat(formatId) {
            const currentValue = formatInput.value.trim();
            
            // Jika input sudah ada, tambahkan dengan "+"
            if (currentValue && !currentValue.endsWith('+')) {
                formatInput.value = currentValue + '+' + formatId;
            } else {
                formatInput.value = formatId;
            }
            
            formatInput.focus();
        }

        async function downloadVideo(){
            const url = urlInput.value.trim();
            const format = formatInput.value.trim();

            if (!url) {
                resultPre.textContent = "❌ URL tidak boleh kosong!";
                return;
            }

            if (!format) {
                resultPre.textContent = "❌ Format tidak boleh kosong!";
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.textContent = "Downloading...";
            resultPre.textContent = "";

            // Use EventSource (SSE) to receive real-time progress
            const params = new URLSearchParams({ url, format });
            const es = new EventSource(`/api/download-stream?${params.toString()}`);
            let currentDownloadId = null;

            cancelBtn.style.display = 'inline-block';
            cancelBtn.disabled = false;
            retryBtn.style.display = 'none';

            progressWrap.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.textContent = '0%';

            es.onmessage = (e) => {
                resultPre.textContent += e.data + "\n";
                resultPre.scrollTop = resultPre.scrollHeight;
            };

            es.addEventListener('progress', (e) => {
                const pct = parseFloat(e.data);
                if (!Number.isNaN(pct)) {
                    const pctSafe = Math.max(0, Math.min(100, pct));
                    progressBar.style.width = pctSafe + '%';
                    progressText.textContent = pctSafe.toFixed(1) + '%';
                }
            });

            es.addEventListener('id', (e) => {
                // server provides the generated download id
                currentDownloadId = e.data;
            });

            es.addEventListener('done', (e) => {
                resultPre.textContent += '\n✅ Selesai.\n';
                es.close();
                downloadBtn.disabled = false;
                downloadBtn.textContent = "Download";
                formatInput.value = "";
                cancelBtn.style.display = 'none';
                // hide progress after brief pause
                setTimeout(() => { progressWrap.style.display = 'none'; }, 800);
            });

            es.addEventListener('error', (e) => {
                resultPre.textContent += '\n❌ Terjadi kesalahan saat mengunduh.\n';
                es.close();
                downloadBtn.disabled = false;
                downloadBtn.textContent = "Download";
                // hide progress after error
                cancelBtn.style.display = 'none';
                // show retry option
                retryBtn.style.display = 'inline-block';
                setTimeout(() => { progressWrap.style.display = 'none'; }, 1500);
            });

            // cancel handler function available globally
            window.cancelDownload = async function () {
                if (!currentDownloadId) return;
                try {
                    cancelBtn.disabled = true;
                    const res = await fetch('/api/download-cancel', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: currentDownloadId })
                    });
                    const json = await res.json();
                    if (json && json.ok) {
                        resultPre.textContent += '\n⚠️ Download dibatalkan oleh pengguna.\n';
                    } else {
                        resultPre.textContent += '\n⚠️ Gagal membatalkan download.\n';
                    }
                } catch (err) {
                    resultPre.textContent += '\n⚠️ Error saat membatalkan.\n';
                } finally {
                    try { es.close(); } catch (e) {}
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = 'Download';
                    cancelBtn.style.display = 'none';
                    retryBtn.style.display = 'inline-block';
                    progressWrap.style.display = 'none';
                }
            };

            // retry handler to re-run download with same inputs
            window.retryDownload = function () {
                retryBtn.style.display = 'none';
                // re-trigger download using current input values
                downloadVideo();
            };

            // If the EventSource cannot connect, show an error
            es.onerror = (err) => {
                // if readyState is CLOSED (2), connection was closed normally
                if (es.readyState === EventSource.CLOSED) return;
                resultPre.textContent += '\n❌ Koneksi terputus.\n';
                es.close();
                downloadBtn.disabled = false;
                downloadBtn.textContent = "Download";
            };
        }

    </script>

</body>
</html>
