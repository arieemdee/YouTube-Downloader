<!DOCTYPE html>
<html>
<head>

    <title>YouTube Downloader</title>

    <style>

        body{
            font-family: Arial;
            background:#111;
            color:#0f0;
            padding:40px;
        }

        input, button{
            padding:10px;
            margin:5px;
            width:400px;
        }

        button{
            background:#0f0;
            color:#000;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }

        button:disabled{
            background:#444;
            color:#999;
            cursor:not-allowed;
        }

        pre{
            background:#000;
            padding:15px;
            overflow:auto;
            white-space:pre-wrap;
        }

    </style>

</head>
<body>

    <h1>🎬 YouTube Downloader</h1>

    <input
        type="text"
        id="url"
        placeholder="Masukkan URL YouTube"
    >

    <br>

    <button id="checkFormatBtn" onclick="getFormats()">
        Cek Format
    </button>

    <pre id="formats"></pre>

    <input
        type="text"
        id="format"
        placeholder="Contoh: 136+140"
    >

    <br>

    <button id="downloadBtn" onclick="downloadVideo()">
        Download
    </button>

    <pre id="result"></pre>

    <script>

        const checkFormatBtn = document.getElementById("checkFormatBtn");
        const downloadBtn = document.getElementById("downloadBtn");

        async function getFormats(){
            checkFormatBtn.disabled = true;
            checkFormatBtn.textContent = "Memeriksa...";

            try {
                const url = document.getElementById("url").value;

                const res = await fetch("/api/formats", {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({ url })
                });

                const text = await res.text();
                document.getElementById("formats").textContent = text;
            } catch (err) {
                document.getElementById("formats").textContent = "Terjadi kesalahan saat memeriksa format.";
            } finally {
                checkFormatBtn.disabled = false;
                checkFormatBtn.textContent = "Cek Format";
            }
        }

        async function downloadVideo(){
            const url = document.getElementById("url").value.trim();
            const format = document.getElementById("format").value.trim();

            if (!url) {
                document.getElementById("result").textContent = "❌ URL tidak boleh kosong!";
                return;
            }

            if (!format) {
                document.getElementById("result").textContent = "❌ Format tidak boleh kosong!";
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.textContent = "Downloading...";

            try {
                const res = await fetch("/api/download", {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({ url, format })
                });

                const text = await res.text();
                document.getElementById("result").textContent = text;

                // Reset form setelah download selesai
                if (text.includes("✅")) {
                    setTimeout(() => {
                        document.getElementById("format").value = "";
                        document.getElementById("result").textContent = "";
                    }, 2000);
                }
            } catch (err) {
                document.getElementById("result").textContent = "Terjadi kesalahan saat mengunduh.";
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.textContent = "Download";
            }
        }

    </script>

</body>
</html>
