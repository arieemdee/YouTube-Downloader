<!DOCTYPE html>
<html>
<head>

    <title>YouTube Downloader</title>

    <style>

        body{
            font-family: Arial;
            background:#111;
            color:#0f0;
            padding:40px;
        }

        input, button{
            padding:10px;
            margin:5px;
            width:400px;
        }

        button{
            background:#0f0;
            color:#000;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }

        button:disabled{
            background:#444;
            color:#999;
            cursor:not-allowed;
        }

        pre{
            background:#000;
            padding:15px;
            overflow:auto;
            white-space:pre-wrap;
        }

        .format-id {
            cursor: pointer;
            color: #6f6;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .format-id:hover {
            background: #1a1a1a;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        /* Progress bar */
        .progress-wrap{
            width:400px;
            background:#111;
            border:1px solid #333;
            padding:6px;
            margin:8px 0;
            display:none;
        }

        .progress{
            width:100%;
            height:18px;
            background:#222;
            border-radius:4px;
            overflow:hidden;
        }

        .progress-bar{
            height:100%;
            width:0%;
            background:linear-gradient(90deg,#0f0,#6f6);
            transition: width 200ms linear;
        }

        .progress-text{
            margin-top:6px;
            color:#0f0;
            font-size:12px;
        }

        /* 👇 BRANDING SECTION - MD Engine */
        .branding {
            text-align: center;
            margin: -15px 0 25px 0;
            padding: 15px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border-radius: 6px;
            border: 1px solid #1a4a1a;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
            transition: all 0.3s ease;
        }

        .branding:hover {
            border: 1px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            transform: translateY(-2px);
        }

        .branding a {
            text-decoration: none;
            color: #0f0;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            display: inline-block;
            padding: 8px 15px;
            background: rgba(0, 255, 0, 0.05);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            transition: all 0.3s ease;
        }

        .branding a:hover {
            background: rgba(0, 255, 0, 0.15);
            border: 1px solid #0f0;
            text-shadow: 0 0 8px #0f0;
            transform: scale(1.05);
        }

        .branding-icon {
            font-size: 18px;
            margin-right: 8px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Update section */
        .update-section {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0a0a0a;
        }

        .update-status {
            display: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .update-status.checking {
            display: block;
            background: #1a1a1a;
            color: #0f0;
            border: 1px solid #0f0;
        }

        .update-status.available {
            display: block;
            background: #2a1a0a;
            color: #fa0;
            border: 1px solid #fa0;
        }

        .update-status.latest {
            display: block;
            background: #0a1a0a;
            color: #0a0;
            border: 1px solid #0a0;
        }

        .update-status.updating {
            display: block;
            background: #1a1a2a;
            color: #0af;
            border: 1px solid #0af;
        }

        .update-status.error {
            display: block;
            background: #2a0a0a;
            color: #f00;
            border: 1px solid #f00;
        }

        #updateBtn {
            width: auto;
            padding: 5px 12px;
            margin-right: 10px;
        }

        #checkUpdateBtn {
            width: auto;
            padding: 5px 12px;
        }

        .cache-info {
            margin-top: 10px;
            font-size: 11px;
            color: #666;
        }

        #clearCacheBtn {
            width: auto;
            padding: 6px 10px;
            font-size: 12px;
            margin-top: 5px;
            background: #444;
            color: #888;
        }

        #clearCacheBtn:hover {
            background: #555;
            color: #aaa;
        }

    </style>

</head>
<body>

    <h1>🎬 YouTube Downloader</h1>

    <input
        type="text"
        id="url"
        autocomplete="off"
        placeholder="Masukkan URL YouTube"
    >

    <br>

    <button id="checkFormatBtn" onclick="getFormats()">
        Cek Format
    </button>

    <pre id="formats" style="max-height: 200px; overflow-y: auto;"></pre>

    <input
        type="text"
        id="format"
        placeholder="Contoh: 136+140"
    >

    <br>

    <button id="downloadBtn" onclick="downloadVideo()">
        Download
    </button>
    <button id="cancelBtn" style="display:none;" onclick="cancelDownload()">Cancel</button>
    <button id="retryBtn" style="display:none;" onclick="retryDownload()">Retry</button>

    <div style="margin-top:10px;">
        <button id="moveFilesBtn" onclick="moveDownloadedFiles()" disabled style="width:320px;">
            Pindah hasil download (0)
        </button>
    </div>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
    </div>

    <!-- Update Section -->
    <div class="update-section">
        <div id="updateStatus" class="update-status"></div>
        <button id="checkUpdateBtn" onclick="checkUpdate()">
            🔄 Cek Update
        </button>
        <button id="updateBtn" onclick="performUpdate()" style="display:none;">
            📥 Update Sekarang
        </button>
        <!-- Cache Info & Clear Cache Button -->
        <div class="cache-info" id="cacheInfo"></div>
        <button id="clearCacheBtn" onclick="clearUpdateCache()" style="display:none;">
            🗑️ Clear Cache
        </button>
    </div>
    <!-- 👇 BRANDING - MD Engine -->
    <span class="branding">
        <a href="https://md-engine.com" target="_blank" rel="noopener noreferrer">
            <span class="branding-icon">⚙️</span>
            Powered by MD Engine
        </a>
    </span>
    <pre id="result" style="max-height: 150px; overflow-y: auto; border: 1px solid #ccc;"></pre>

    <script>

        const checkFormatBtn = document.getElementById("checkFormatBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const urlInput = document.getElementById('url');
        const formatInput = document.getElementById('format');
        const formatsPre = document.getElementById('formats');
        const resultPre = document.getElementById('result');
        const cancelBtn = document.getElementById('cancelBtn');
        const retryBtn = document.getElementById('retryBtn');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        // select-all on focus and keep selection on mouse click
        if (urlInput) {
          urlInput.addEventListener('focus', e => e.target.select());
          urlInput.addEventListener('mouseup', e => e.preventDefault());
        }

        function handleEnterKey(e) {
          const isEnter = e.key === 'Enter' || e.code === 'Enter';
          if (!isEnter) return;
          e.preventDefault();

          if (document.activeElement === urlInput) {
            getFormats();
          } else if (document.activeElement === formatInput) {
            downloadVideo();
          }
        }

        if (urlInput) {
          urlInput.addEventListener('keydown', handleEnterKey);
        }

        if (formatInput) {
          formatInput.addEventListener('keydown', handleEnterKey);
        }

        async function getFormats(){
            checkFormatBtn.disabled = true;
            checkFormatBtn.textContent = "Memeriksa...";

            try {
                const url = urlInput.value;

                const res = await fetch("/api/formats", {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({ url })
                });

                const text = await res.text();
                // Parse and make format IDs clickable
                const htmlContent = makeFormatIdsClickable(text);
                formatsPre.innerHTML = htmlContent;
            } catch (err) {
                formatsPre.textContent = "Terjadi kesalahan saat memeriksa format.";
            } finally {
                checkFormatBtn.disabled = false;
                checkFormatBtn.textContent = "Cek Format";
            }
        }

        function makeFormatIdsClickable(text) {
            // Replace format IDs (dapat berupa angka, huruf, underscore, dash)
            // Matches: 136, 137_2, abc123, atau kombinasi dengan + (e.g., 136+140, 137_2+140, dll)
            return text.replace(/\b([a-zA-Z0-9_-]+(?:\+[a-zA-Z0-9_-]+)*)\b/g, (match) => {
                return `<span class="format-id" onclick="selectFormat('${match}')" title="Klik untuk memilih">${match}</span>`;
            });
        }

        function selectFormat(formatId) {
            const currentValue = formatInput.value.trim();
            
            // Jika input sudah ada, tambahkan dengan "+"
            if (currentValue && !currentValue.endsWith('+')) {
                formatInput.value = currentValue + '+' + formatId;
            } else {
                formatInput.value = formatId;
            }
            
            formatInput.focus();
        }

        async function downloadVideo(){
            const url = urlInput.value.trim();
            const format = formatInput.value.trim();

            if (!url) {
                resultPre.textContent = "❌ URL tidak boleh kosong!";
                return;
            }

            if (!format) {
                resultPre.textContent = "❌ Format tidak boleh kosong!";
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.textContent = "Downloading...";
            resultPre.textContent = "";

            // Use EventSource (SSE) to receive real-time progress
            const params = new URLSearchParams({ url, format });
            const es = new EventSource(`/api/download-stream?${params.toString()}`);
            let currentDownloadId = null;

            cancelBtn.style.display = 'inline-block';
            cancelBtn.disabled = false;
            retryBtn.style.display = 'none';

            progressWrap.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.textContent = '0%';

            es.onmessage = (e) => {
                resultPre.textContent += e.data + "\n";
                resultPre.scrollTop = resultPre.scrollHeight;
            };

            es.addEventListener('progress', (e) => {
                const pct = parseFloat(e.data);
                if (!Number.isNaN(pct)) {
                    const pctSafe = Math.max(0, Math.min(100, pct));
                    progressBar.style.width = pctSafe + '%';
                    progressText.textContent = pctSafe.toFixed(1) + '%';
                }
            });

            es.addEventListener('id', (e) => {
                // server provides the generated download id
                currentDownloadId = e.data;
            });

            es.addEventListener('done', (e) => {
                resultPre.textContent += '\n✅ Selesai.\n';
                es.close();
                downloadBtn.disabled = false;
                downloadBtn.textContent = "Download";
                formatInput.value = "";
                cancelBtn.style.display = 'none';
                refreshDownloadStatus();
                // hide progress after brief pause
                setTimeout(() => { progressWrap.style.display = 'none'; }, 800);
            });

            es.addEventListener('error', (e) => {
                resultPre.textContent += '\n❌ Terjadi kesalahan saat mengunduh.\n';
                es.close();
                downloadBtn.disabled = false;
                downloadBtn.textContent = "Download";
                // hide progress after error
                cancelBtn.style.display = 'none';
                // show retry option
                retryBtn.style.display = 'inline-block';
                refreshDownloadStatus();
                setTimeout(() => { progressWrap.style.display = 'none'; }, 1500);
            });

            // cancel handler function available globally
            window.cancelDownload = async function () {
                if (!currentDownloadId) return;
                try {
                    cancelBtn.disabled = true;
                    const res = await fetch('/api/download-cancel', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: currentDownloadId })
                    });
                    const json = await res.json();
                    if (json && json.ok) {
                        resultPre.textContent += '\n⚠️ Download dibatalkan oleh pengguna.\n';
                    } else {
                        resultPre.textContent += '\n⚠️ Gagal membatalkan download.\n';
                    }
                } catch (err) {
                    resultPre.textContent += '\n⚠️ Error saat membatalkan.\n';
                } finally {
                    try { es.close(); } catch (e) {}
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = 'Download';
                    cancelBtn.style.display = 'none';
                    retryBtn.style.display = 'inline-block';
                    progressWrap.style.display = 'none';
                }
            };

            // retry handler to re-run download with same inputs
            window.retryDownload = function () {
                retryBtn.style.display = 'none';
                // re-trigger download using current input values
                downloadVideo();
            };

            // If the EventSource cannot connect, show an error
            es.onerror = (err) => {
                // if readyState is CLOSED (2), connection was closed normally
                if (es.readyState === EventSource.CLOSED) return;
                resultPre.textContent += '\n❌ Koneksi terputus.\n';
                es.close();
                downloadBtn.disabled = false;
                downloadBtn.textContent = "Download";
            };
        }

        async function refreshDownloadStatus() {
            const moveFilesBtn = document.getElementById('moveFilesBtn');

            try {
                const res = await fetch('/api/download-status');
                const data = await res.json();
                const count = Number(data.count || 0);
                moveFilesBtn.disabled = count <= 0;
                moveFilesBtn.textContent = `Pindah hasil download (${count})`;
            } catch (err) {
                moveFilesBtn.disabled = true;
                moveFilesBtn.textContent = 'Pindah hasil download (error)';
            }
        }

        async function moveDownloadedFiles() {
            const moveFilesBtn = document.getElementById('moveFilesBtn');

            moveFilesBtn.disabled = true;
            moveFilesBtn.textContent = 'Memindahkan...';
            resultPre.textContent = '';

            try {
                const res = await fetch('/api/move-downloads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();

                if (data.status === 'success') {
                    resultPre.textContent = `✅ Dipindah ${data.moved} file ke:\n${data.destination}`;
                } else {
                    resultPre.textContent = `❌ Gagal memindahkan: ${data.error || 'Unknown error'}`;
                }
            } catch (err) {
                resultPre.textContent = `❌ Gagal memindahkan: ${err.message || err}`;
            } finally {
                await refreshDownloadStatus();
            }
        }

        // ======= UPDATE FUNCTIONS =======
        async function checkUpdate() {
            const checkBtn = document.getElementById('checkUpdateBtn');
            const updateBtn = document.getElementById('updateBtn');
            const statusDiv = document.getElementById('updateStatus');
            const cacheInfoDiv = document.getElementById('cacheInfo');
            const clearCacheBtn = document.getElementById('clearCacheBtn');

            checkBtn.disabled = true;
            updateBtn.style.display = 'none';
            cacheInfoDiv.textContent = '';
            clearCacheBtn.style.display = 'none';
            statusDiv.className = 'update-status checking';
            statusDiv.textContent = '🔄 Memeriksa update...';

            try {
                const res = await fetch('/api/check-update');
                const data = await res.json();

                if (data.error) {
                    statusDiv.className = 'update-status error';
                    statusDiv.textContent = '❌ Error: ' + data.error;
                    return;
                }

                // 👇 Tampilkan cache status
                if (data.cached) {
                    cacheInfoDiv.textContent = '💾 Menggunakan cache (diperbarui dalam 24 jam terakhir) | ';
                    if (data.stale) {
                        cacheInfoDiv.textContent += '⚠️ Cache lama digunakan karena pengecekan GitHub gagal.';
                    }
                    clearCacheBtn.style.display = 'inline-block';
                } else {
                    cacheInfoDiv.textContent = '🔄 Baru di-check dari GitHub API';
                    clearCacheBtn.style.display = 'inline-block';
                }

                if (data.updateAvailable) {
                    statusDiv.className = 'update-status available';
                    statusDiv.textContent = `⚠️ Update tersedia! Versi saat ini: ${data.currentVersion} → ${data.latestVersion}`;
                    updateBtn.style.display = 'inline-block';
                } else {
                    statusDiv.className = 'update-status latest';
                    statusDiv.textContent = `✅ Sudah versi terbaru: ${data.currentVersion}`;
                }
            } catch (err) {
                statusDiv.className = 'update-status error';
                statusDiv.textContent = '❌ Error: ' + err.message;
            } finally {
                checkBtn.disabled = false;
            }
        }

        async function performUpdate() {
            const updateBtn = document.getElementById('updateBtn');
            const statusDiv = document.getElementById('updateStatus');

            // Confirmation dialog
            const confirmed = confirm(
                '⚠️ PERHATIAN!\n\n' +
                'Update akan mengunduh versi terbaru yt-dlp dan mengganti file yang ada.\n\n' +
                'Proses ini mungkin memakan waktu beberapa menit.\n\n' +
                'Lanjutkan?'
            );

            if (!confirmed) {
                statusDiv.className = 'update-status';
                statusDiv.textContent = '';
                return;
            }

            updateBtn.disabled = true;
            statusDiv.className = 'update-status updating';
            statusDiv.textContent = '📥 Sedang update... Mohon tunggu, jangan tutup aplikasi!';

            try {
                const res = await fetch('/api/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await res.json();

                if (data.status === 'success') {
                    statusDiv.className = 'update-status latest';
                    statusDiv.textContent = `✅ ${data.message}`;
                    updateBtn.style.display = 'none';
                } else if (data.status === 'already_latest') {
                    statusDiv.className = 'update-status latest';
                    statusDiv.textContent = `✅ ${data.message}`;
                    updateBtn.style.display = 'none';
                } else {
                    statusDiv.className = 'update-status error';
                    statusDiv.textContent = `❌ Update gagal: ${data.message}`;
                }
            } catch (err) {
                statusDiv.className = 'update-status error';
                statusDiv.textContent = '❌ Error: ' + err.message;
            } finally {
                updateBtn.disabled = false;
            }
        }

        // 👇 FUNGSI BARU: Clear update cache
        // Gunakan untuk force check update tanpa menunggu 24 jam
        async function clearUpdateCache() {
            const clearCacheBtn = document.getElementById('clearCacheBtn');
            const cacheInfoDiv = document.getElementById('cacheInfo');

            clearCacheBtn.disabled = true;
            cacheInfoDiv.textContent = '🗑️ Sedang menghapus cache...';

            try {
                const res = await fetch('/api/clear-update-cache', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await res.json();

                if (data.success) {
                    cacheInfoDiv.textContent = '✅ Cache dihapus! Next check akan hit API baru.';
                    // Auto check update setelah clear cache
                    setTimeout(() => {
                        checkUpdate();
                    }, 1000);
                } else {
                    cacheInfoDiv.textContent = '⚠️ Cache sudah kosong';
                }
            } catch (err) {
                cacheInfoDiv.textContent = '❌ Error: ' + err.message;
            } finally {
                clearCacheBtn.disabled = false;
            }
        }

        // Auto-check for update and refresh download status on page load
        window.addEventListener('load', () => {
            checkUpdate();
            refreshDownloadStatus();
        });

    </script>

</body>
</html>
